<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير بوتات تيليجرام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .floating-btn { position: fixed; top: 20px; left: 20px; width: 50px; height: 50px; border-radius: 50%; background: #3b82f6; cursor: pointer; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.5); display: flex; justify-content: center; align-items: center; transition: 0.3s; }
        .floating-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

    <!-- الزر العائم للأدمن -->
    <div class="floating-btn" onclick="askAdminCode()">
        <i class="fas fa-user-shield text-white text-xl"></i>
    </div>

    <!-- كارت إدخال التوكن -->
    <div class="glass p-8 rounded-2xl shadow-2xl w-full max-w-md text-center" id="bot-login-section" style="display:none;">
        <i class="fab fa-telegram text-6xl text-blue-400 mb-4"></i>
        <h2 class="text-2xl font-bold mb-6">إدارة البوت</h2>
        <input type="text" id="bot_token" placeholder="أدخل توكن البوت (Bot Token)" class="w-full p-3 rounded bg-gray-800 text-white border border-gray-600 focus:outline-none focus:border-blue-500 mb-4">
        <button onclick="loginBot()" class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-3 rounded transition duration-300">
            دخول للنظام <i class="fas fa-sign-in-alt ml-2"></i>
        </button>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
